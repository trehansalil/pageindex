name: Build & Push to GHCR

on:
  push:
    branches: [master]

env:
  IMAGE_NAME: ghcr.io/trehansalil/pageindex-mcp

jobs:
  # Quality gate: the no-infra prefix (gates 1-6: static, unit, contracts, dag,
  # build, supply-chain) must pass before any image is built or deployed.
  # AGENT_DRIVEN_DEVELOPMENT.md §7/§10; wired by RFC-002. Gates 7-8 (integration,
  # e2e) need MinIO+Redis and are not run here.
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up uv (Python 3.12)
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run quality gates (no-infra prefix)
        run: bash scripts/eval.sh --no-infra

  build-push:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
            ${{ env.IMAGE_NAME }}:latest

      - name: Trigger deploy
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.DEPLOY_PAT }}
          repository: trehansalil/hetzner-deployment-service
          event-type: pageindex-mcp-image-updated
          client-payload: '{"app": "pageindex-mcp", "image_tag": "sha-${{ github.sha }}"}'
