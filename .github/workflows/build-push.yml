name: Build & Push to GHCR

on:
  push:
    branches: [master]

env:
  IMAGE_NAME: ghcr.io/trehansalil/pageindex-mcp

jobs:
  # Quality gate: the no-infra prefix (gates 1-6: static, unit, contracts, dag,
  # build, supply-chain) must pass before any image is built or deployed.
  # AGENT_DRIVEN_DEVELOPMENT.md §7/§10; wired by RFC-002. Gates 7-8 (integration,
  # e2e) need MinIO+Redis and are not run here.
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up uv (Python 3.12)
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run quality gates (no-infra prefix)
        run: bash scripts/eval.sh --no-infra

  build-push:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # THE structural fix: switches the push off the built-in `docker` driver
      # (Docker daemon pushes blobs SERIALLY via the Docker API with weak retry, so
      # one stalled blob fails the whole step) onto the docker-container/BuildKit
      # driver, which pushes blobs CONCURRENTLY and retries registry ops with
      # backoff internally — so most transient ghcr.io blips self-heal within a
      # single run. Also a prerequisite for the type=gha layer cache below.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Exposes ACTIONS_RUNTIME_TOKEN / ACTIONS_CACHE_URL(S) into $GITHUB_ENV so the
      # raw `docker buildx build` below can read/write the type=gha cache.
      # docker/build-push-action injects these automatically; the raw CLI does not,
      # so without this step cache-from silently misses and cache-to errors (and is
      # swallowed by ignore-error=true) — defeating the cache entirely.
      - name: Expose GitHub Actions runtime for buildx gha cache
        uses: crazy-max/ghaction-github-runtime@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # The GET /v2/ "context deadline exceeded" failure is transient ghcr.io /
      # runner network flakiness (server returns no headers), amplified by the
      # ~3GB image. build-push-action has NO built-in push retry
      # (docker/build-push-action#84), and a `uses:` action cannot sit inside
      # nick-fields/retry's `command:`, so the push is invoked as raw buildx CLI
      # here and retried: a single blip re-attempts instead of failing the job.
      # On retry the layers are already in the local builder + gha cache, so only
      # the failed push is re-sent (fast & cheap).
      # NOTE: retry is a mitigation, not a cure — a full ghcr.io outage exhausts
      # all attempts; watch attempt counts so chronic flakiness isn't masked.
      - name: Build and push (retry on transient ghcr.io blips)
        uses: nick-fields/retry@v3
        # HF_TOKEN is forwarded as a BuildKit secret (not an --build-arg) so the
        # token never lands in an image layer or in `docker history`. Repo secret
        # is optional: if unset, env stays empty, the Dockerfile's
        # `required=false` mount accepts that, and the HF download falls back to
        # anonymous rate-limited access (the warning we're suppressing).
        # `env` must sit at STEP scope (sibling of `with`), not nested inside
        # `with` — nick-fields/retry inherits the step env into its shell, while
        # anything under `with` is treated as an action input and dropped.
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        with:
          timeout_minutes: 40
          max_attempts: 4
          retry_wait_seconds: 30
          retry_on: error
          command: |
            docker buildx build \
              --push \
              --provenance=false \
              --sbom=false \
              --cache-from type=gha \
              --cache-to type=gha,mode=max,ignore-error=true \
              --secret id=hf_token,env=HF_TOKEN \
              -t ${{ env.IMAGE_NAME }}:sha-${{ github.sha }} \
              -t ${{ env.IMAGE_NAME }}:latest \
              .

      - name: Trigger deploy
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.DEPLOY_PAT }}
          repository: trehansalil/hetzner-deployment-service
          event-type: pageindex-mcp-image-updated
          client-payload: '{"app": "pageindex-mcp", "image_tag": "sha-${{ github.sha }}"}'
