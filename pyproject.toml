[project]
name = "pageindex-mcp"
version = "1.0.0"
description = "PageIndex MCP Server — vectorless reasoning-based RAG via FastMCP"
requires-python = ">=3.12"
dependencies = [
    "fastmcp>=3.2.0",
    "litellm>=1.82.0",
    "pymupdf>=1.26.4",
    "PyPDF2>=3.0.1",
    "python-dotenv>=1.1.0",
    "pyyaml>=6.0.2",
    "openai>=1.30.0",
    "httpx>=0.27.0",
    "python-pptx>=1.0.0",
    "python-docx>=1.2.0",
    "minio>=7.2.0",
    "html2text>=2020.1.16",
    "redis[asyncio]>=5.0.0",
    "arq>=0.26.1",
    "fastapi>=0.110.0",
    "uvicorn>=0.30.0",
    "anyio>=4.0.0",
    "python-multipart>=0.0.9",
    "prometheus_client>=0.20.0",
    "pageindex @ git+https://github.com/trehansalil/PageIndex-salil.git",
]

[project.optional-dependencies]
dev = ["pytest", "pytest-asyncio", "httpx", "fakeredis[aioredis]", "langchain-mcp-adapters", "langchain[openai]"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.metadata]
allow-direct-references = true

[tool.hatch.build.targets.wheel]
packages = ["src/pageindex_mcp"]

[tool.pytest.ini_options]
asyncio_mode = "auto"

[project.scripts]
pageindex-mcp = "pageindex_mcp.server:main"
