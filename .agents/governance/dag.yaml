# .agents/governance/dag.yaml
#
# Declarative dependency graph for parallelizable artifact creation.
# Single source of truth for "what runs before what, and what can run alongside
# what" across bootstrap, tool_discovery, and phase_features.
#
# Edit rules:
#   - Only `depends_on` is hand-edited. `derived:` is regenerated by
#     `scripts/gates/dag.sh --write` — never hand-edit it. A plain gate run is
#     read-only and only warns when `derived:` is stale.
#   - Adding or removing a node requires an RFC.
#   - dag.sh validates: graph is acyclic, every node maps to a real artifact
#     path, execution order matches declared topology.
#
# Every node carries a `check:` block — the only machine-checkable contract for
# "does this artifact exist". `artifact:` is a human-readable label, not a path.
#   type: file  → satisfied only by `test -f` on each path (a parent dir is never evidence)
#   type: dir   → satisfied by `test -d` on each path
#   type: glob  → satisfied when total matches across patterns >= min_matches

version: 1

# ── 1. BOOTSTRAP — runs once per repo during onboarding ──────────────────────
bootstrap:
  nodes:
    - id: scaffold
      artifact: "directory skeleton (.agents/, scripts/, src/pageindex_mcp/)"
      depends_on: []
      kind: filesystem
      check:
        type: dir
        paths: [".agents/", "scripts/", "src/pageindex_mcp/"]

    - id: prd
      artifact: "PRD.md"
      depends_on: [scaffold]
      kind: human_authored
      note: "Frozen external input. No-op pass-through if a PRD already exists."
      check:
        type: file
        paths: ["PRD.md"]

    - id: vocabulary
      artifact: ".agents/governance/vocabulary.yaml"
      depends_on: [scaffold]
      kind: human_authored
      note: "Must exist before any other governance YAML — those reference its terms."
      check:
        type: file
        paths: [".agents/governance/vocabulary.yaml"]

    - id: scope_checklist
      artifact: ".agents/governance/scope-checklist.yaml"
      depends_on: [vocabulary]
      kind: human_authored
      check:
        type: file
        paths: [".agents/governance/scope-checklist.yaml"]

    - id: develop_guide
      artifact: ".agents/governance/develop-guide.yaml"
      depends_on: [vocabulary]
      kind: human_authored
      check:
        type: file
        paths: [".agents/governance/develop-guide.yaml"]

    - id: verify_gates
      artifact: ".agents/governance/verify-gates.yaml"
      depends_on: [vocabulary]
      kind: human_authored
      check:
        type: file
        paths: [".agents/governance/verify-gates.yaml"]

    - id: known_advisories
      artifact: ".agents/governance/known-advisories.yaml"
      depends_on: [vocabulary]
      kind: human_authored
      note: "Starts empty. Populated as the supply-chain gate fires."
      check:
        type: file
        paths: [".agents/governance/known-advisories.yaml"]

    - id: tools_md
      artifact: "TOOLS.md"
      depends_on: [prd]
      kind: skill_generated
      generated_by: "tool-curator-orchestrator"
      check:
        type: file
        paths: ["TOOLS.md"]

    - id: architecture
      artifact: "ARCHITECTURE.md"
      depends_on: [prd]
      kind: human_authored
      check:
        type: file
        paths: ["ARCHITECTURE.md"]

    - id: design
      artifact: "DESIGN.md"
      depends_on: [prd]
      kind: human_authored
      optional: true
      check:
        type: file
        paths: ["DESIGN.md"]

    - id: rfc_000
      artifact: ".agents/rfcs/000-foundational-design.md"
      depends_on: [architecture, scope_checklist, develop_guide, verify_gates]
      kind: human_authored
      note: "Captures risks, resolved PRD ambiguities, interfaces, mock strategy, phase split, and the initial phase_features.modules list."
      check:
        type: file
        paths: [".agents/rfcs/000-foundational-design.md"]

    - id: rfc_001
      artifact: ".agents/rfcs/001-initial-plan-review.md"
      depends_on: [rfc_000]
      kind: human_authored
      check:
        type: file
        paths: [".agents/rfcs/001-initial-plan-review.md"]

    - id: gate_scripts
      artifact: "scripts/gates/*.sh, scripts/eval.sh"
      depends_on: [verify_gates]
      kind: code
      check:
        type: glob
        paths: ["scripts/gates/*.sh", "scripts/eval.sh"]
        min_matches: 2

    - id: ci
      artifact: "CI workflow running scripts/eval.sh"
      depends_on: [gate_scripts]
      kind: infra
      check:
        type: glob
        paths: [".github/workflows/*.yml", ".github/workflows/*.yaml"]
        min_matches: 1

    - id: pending_decisions
      artifact: ".agents/state/PENDING_DECISIONS.md"
      depends_on: [scaffold]
      kind: human_authored
      note: "Empty file with the standard sections. Populates over time."
      check:
        type: file
        paths: [".agents/state/PENDING_DECISIONS.md"]

    - id: phase_1_contracts
      artifact: ".agents/contracts/*.yaml (phase 1 set)"
      depends_on: [rfc_001, tools_md]
      kind: human_authored
      note: "tools_md is a soft dependency: contracts can be drafted without TOOLS.md, but external-collaborator references must wait."
      check:
        type: glob
        paths: [".agents/contracts/*.yaml"]
        min_matches: 1

# ── 2. TOOL DISCOVERY — the /tool-curator skill's internal fan-out ─────────
tool_discovery:
  orchestrator_model: "claude-sonnet-4-6"
  output: "TOOLS.md"

  nodes:
    - id: phase_extractor
      role: "Build the Phase Map from AGENT_DRIVEN_DEVELOPMENT.md"
      depends_on: []
      model: haiku

    - id: inventory_scanner
      role: "List owned/native tools already in repo (.mcp.json, skills, plugins)"
      depends_on: []
      model: haiku

    - id: gap_analyzer
      role: "One sub-agent per phase; classify gaps"
      depends_on: [phase_extractor, inventory_scanner]
      model: haiku
      fan_out: per_phase

    - id: registry_searcher
      role: "Search Anthropic Skills, MCP, npm/PyPI, GitHub"
      depends_on: [gap_analyzer]
      model: sonnet

    - id: tool_evaluator
      role: "Score candidates against the 5-axis rubric"
      depends_on: [registry_searcher]
      model: sonnet

    - id: conflict_resolver
      role: "Resolve cross-phase tool collisions"
      depends_on: [tool_evaluator]
      model: opus
      conditional: "only if tool_evaluator reports collisions"

    - id: curator
      role: "Apply tool cap, write TOOLS.md"
      depends_on: [tool_evaluator, conflict_resolver]
      model: sonnet

# ── 3. PHASE FEATURES — per-phase parallelizable module build ────────────────
# Single source of truth for module dependencies. dag.sh combines
# module_layer_order with the modules list to produce one concrete DAG per
# phase. Modules with no shared ancestors build in parallel.
phase_features:
  # Fixed layer build order within a single module.
  module_layer_order:
    - id: schema
      depends_on: []
      note: "No I/O. Always first. Schemas across modules can build in parallel."
    - id: repository
      depends_on: [schema]
      note: "Persistence access."
    - id: provider
      depends_on: [schema]
      note: "External adapter. Independent of repository — builds in parallel with it."
    - id: service
      depends_on: [repository, provider]
      note: "Business logic. Depends on interfaces, not implementations."
    - id: route
      depends_on: [service]
      note: "Transport/HTTP layer. Last."
    - id: tests
      depends_on: [route]
      note: "Unit tests colocate per layer; full coverage check waits for route."

  # Project-specific. MUST start empty in a fresh repo — do not seed from
  # another project. RFC-000 derives the module set from this repo's PRD.md and
  # ARCHITECTURE.md; later RFCs amend it. Only `depends_on` is hand-editable.
  #
  # Example shape (illustrative — replace during RFC-000):
  #   modules:
  #     - id: auth
  #       phase: 1
  #       depends_on: []
  #     - id: users
  #       phase: 1
  #       depends_on: [auth]
  #     - id: bookings
  #       phase: 2
  #       depends_on: [users]
  #
  # Applied by RFC-002 (Amendment 1) with CODE-ACCURATE edges derived from the
  # actual intra-package imports — these supersede RFC-000's declared edges where
  # the implementation diverged. config/auth/metrics/helpers are cross-cutting
  # leaves, not nodes (helpers imports storage, so it pulls storage transitively).
  modules:
    - id: cache          # repository: Redis read-through accessor cache.get_doc -> storage.load_doc on miss
      phase: 1
      depends_on: [storage]
    - id: storage        # repository: pure MinIO store; cache invalidation via lazy import, not a structural edge
      phase: 1
      depends_on: []
    - id: converters     # provider: format -> PDF/markdown (pdf_to_markdown via pymupdf4llm); stdlib + lazy config only
      phase: 1
      depends_on: []
    - id: client         # service: CustomPageIndexClient.index + validate_tree gate; reads via cache.get_doc
      phase: 1
      depends_on: [storage, converters, cache]
    - id: worker         # service: arq process_document_job; imports .client + .storage; catches helpers.LowQualityTreeError
      phase: 1
      depends_on: [client, storage]
    - id: upload_app     # transport: FastAPI upload; imports .storage + .client, enqueues arq job by name
      phase: 1
      depends_on: [storage, client]
    - id: server         # transport: FastMCP + query tools (tools/documents.py -> storage + cache) + mounts upload_app
      phase: 1
      depends_on: [storage, upload_app, cache]
    - id: graph          # service: cross-tier networkx graph + diff (Tier 2; no code yet)
      phase: 2
      depends_on: [client, storage]

