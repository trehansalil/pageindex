feature: LLM-02
name: Langfuse Tracing & Cost Monitoring
module: tracing
phase: 1
source: plans/unified-knitting-volcano.md

contracts:
  - id: LLM-02-C1
    desc: "Langfuse tracing activates only when both keys are set; otherwise fully inert"
    trigger: "langfuse_enabled() / init_langfuse() is called"
    effect: "Returns True / constructs the Langfuse singleton only when settings.langfuse_public_key AND settings.langfuse_secret_key are non-empty; with either empty every tracing entry point is a no-op and the LLM-01 path is unchanged"
    boundary: "Reads settings.langfuse_public_key and settings.langfuse_secret_key from the Settings singleton"

  - id: LLM-02-C2
    desc: "Query path returns a langfuse.openai-wrapped client when tracing is enabled"
    trigger: "get_openai_client() is called (helpers._llm query path) with tracing enabled"
    effect: "When langfuse_enabled() is True, get_openai_client() takes its instrumented branch — it calls init_langfuse() and constructs the client from the langfuse.openai AsyncOpenAI/AsyncAzureOpenAI wrapper (carrying OPENAI_BASE_URL / azure_endpoint) so each chat.completions.create emits a traced generation with usage and cost; when tracing is disabled it constructs the plain openai.AsyncOpenAI/AsyncAzureOpenAI and LLM-01 behavior is byte-for-byte unchanged"
    boundary: "Delegates provider selection to resolve_llm_provider(); the enabled/disabled branch is an inline langfuse_enabled() check in get_openai_client() (the langfuse.openai wrapper patches openai globally at import, so the wrapped class is openai's own class)"

  - id: LLM-02-C3
    desc: "Ingestion path registers the litellm Langfuse callback when tracing is enabled, and flushes it on exit"
    trigger: "configure_litellm() is called at the converters_cli subprocess entry with tracing enabled"
    effect: "_instrument_litellm_tracing() appends 'langfuse_otel' to litellm.callbacks (idempotent) so every fork litellm.completion emits a traced generation; flush_litellm_tracing() force-flushes that callback's private OTel span processor before the subprocess exits so buffered ingestion spans + cost are not lost; when tracing is disabled no callback is registered and the flush is a no-op"
    boundary: "_instrument_litellm_tracing() runs after the LLM-01 endpoint setup in configure_litellm(); flush_litellm_tracing() is called from converters_cli.main()'s finally; both no-op when langfuse_enabled() is False"

  - id: LLM-02-C4
    desc: "Content masking is on by default and preserves usage/cost"
    trigger: "An LLM generation is exported while settings.langfuse_trace_content is False"
    effect: "Query-path prompt/completion bodies are replaced by a sentinel via the langfuse mask (_mask), and ingestion-path messages are redacted via litellm.turn_off_message_logging=True; token usage, model, and cost are still recorded. With langfuse_trace_content True the content is captured verbatim"
    boundary: "Reads settings.langfuse_trace_content; mask is applied inside the SDK/exporter before any network egress"

  - id: LLM-02-C5
    desc: "An MCP tool call groups its LLM generations under a single Langfuse trace"
    trigger: "find_relevant_documents() runs its body inside trace_tool('find_relevant_documents') with tracing enabled"
    effect: "Opens one Langfuse span named for the tool so the prefilter + concurrent search generations nest under a single trace; trace_tool is a plain no-op async context manager when tracing is disabled"
    boundary: "Wraps the tool body in tools/documents.py; never raises into the tool path"
