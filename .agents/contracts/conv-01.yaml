feature: CONV-01
name: Format Converter Maps Each Supported Format to Its Converter
module: converters
phase: 1
source: rfcs/000-foundational-design.md#initial-contract-set

contracts:
  - id: CONV-01-C1
    desc: "Each supported input format is dispatched to its dedicated converter function"
    trigger: "DocumentClient.index() dispatches on a file extension of .pdf, .docx, .pptx, or .html"
    effect: ".pdf iterates the pdf_markdown_converters() chain (Docling primary, pymupdf4llm fallback) and on full-chain failure falls back to legacy page_index; .docx/.pptx are primarily routed through libreoffice_to_pdf + page_index, falling back to docx_to_markdown / pptx_to_markdown only when LibreOffice/page_index fails; .html invokes html_to_markdown_with_images; the markdown-producing paths yield a non-empty markdown string"
    boundary: "File exists and the extension matches one of the four supported formats"

  - id: CONV-01-C2
    desc: "En-dash characters in converter output are normalized to ASCII hyphen for clause-code matching"
    trigger: "Any converter function returns markdown output containing Unicode en-dash (U+2013) characters"
    effect: "All en-dash characters in the returned string are replaced with ASCII hyphen (-) before the string is returned to the caller; clause-code matching downstream operates on normalized text"
    boundary: "Converter output contains one or more en-dash characters"

  - id: CONV-01-C3
    desc: "An unsupported file format yields an unsupported_format error and no markdown output"
    trigger: "DocumentClient.index() called with a file whose extension is not in (.pdf, .docx, .pptx, .html, .md, .markdown, .txt, .xlsx, .png, .jpg, .jpeg, .tiff, .tif)"
    effect: "Raises or returns an error with reason=unsupported_format; no markdown string is produced; no LLM call or subprocess is initiated"
    boundary: "File extension is absent from the supported-format list (_SUPPORTED | _IMAGE_EXTS in client.py)"

  # RFC-005 Fix 4 additions (2026-07-01): _SUPPORTED extended with .xlsx and
  # _IMAGE_EXTS = {.png, .jpg, .jpeg, .tiff, .tif}. C1/C3 boundary text above updated
  # to match; C4/C5 below cover the two new dispatch branches specifically.
  - id: CONV-01-C4
    desc: ".xlsx input is dispatched through openpyxl to the flat-table path, not the tree path"
    trigger: "DocumentClient.index() dispatches on a file extension of .xlsx"
    effect: "xlsx_to_markdown(file_path) (openpyxl, MIT-licensed, no AGPL/HR4 violation) converts each non-empty worksheet to a markdown pipe-table (fully empty worksheets are skipped; a workbook where every worksheet is empty raises); the combined markdown is run through _run_md_to_tree; spreadsheets carry no heading hierarchy so the result naturally satisfies depth<2 and is routed to the flat success path (FLAT-03), reusing TABLE-01 stitching on the resulting flat table blocks"
    boundary: "File exists, extension is exactly .xlsx; no .xls (legacy binary format) support is provided"

  - id: CONV-01-C5
    desc: "Image input is dispatched through local Tesseract OCR only; VLM stays disabled (HR3)"
    trigger: "DocumentClient.index() dispatches on a file extension in {.png, .jpg, .jpeg, .tiff, .tif}"
    effect: "ensure_tessdata(['ara','deu','eng']) provisions a superset language set (no pre-existing text layer exists to sample for language detection) but may return a degraded subset when a language's traineddata is unavailable under TESSDATA_PREFIX and downloads are disabled (never raises; falls back to ['deu','eng'] if nothing is available), then image_to_markdown(file_path, langs) OCRs the image locally via Tesseract with whichever languages ensure_tessdata returned; the resulting markdown is run through _run_md_to_tree; no VLM/LLM vision call is made at any point in this path (HR3 — no LLM egress on the image OCR route)"
    boundary: "File exists, extension matches one of the five supported image extensions; VLM_MODE remains 'disabled' by default per RFC-004 — this contract does not re-enable it"
